<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloads - Noriks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            padding: 30px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        /* Search Bar */
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }
        .search-input:focus { outline: none; border-color: #10b981; }
        .search-input::placeholder { color: #666; }
        
        .refresh-btn {
            padding: 12px 20px;
            background: #10b981;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #059669; }
        
        /* Jobs List */
        .jobs-list { display: flex; flex-direction: column; gap: 20px; }
        
        .job-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        .job-card.processing { border-color: #fbbf24; }
        .job-card.done { border-color: #10b981; }
        .job-card.error { border-color: #ef4444; }
        
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .job-name { font-size: 18px; font-weight: 600; }
        .job-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .job-status.pending { background: #333; color: #888; }
        .job-status.processing { background: #fbbf2433; color: #fbbf24; }
        .job-status.done { background: #10b98133; color: #10b981; }
        .job-status.error { background: #ef444433; color: #ef4444; }
        
        /* Progress Bar */
        .progress-container {
            margin-bottom: 15px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
            color: #888;
        }
        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #10b981;
            transition: width 0.3s;
        }
        .progress-fill.processing { background: #fbbf24; }
        
        /* Download Grid */
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .download-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #0f0f0f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #fff;
        }
        .download-item:hover { background: #252525; }
        .download-item.downloaded { 
            background: #7f1d1d33;
            border: 1px solid #ef4444;
        }
        .download-item .flag { font-size: 24px; }
        .download-item .info { font-size: 13px; }
        .download-item .info .code { font-weight: 600; }
        .download-item .info .size { color: #666; font-size: 11px; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        
        /* Meta info */
        .job-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video Downloads</h1>
        <p class="subtitle">Lokalizirani videi v 7 jezikov</p>
        
        <div class="search-bar">
            <input type="text" class="search-input" id="search" placeholder="🔍 Išči po ID (npr. ID460)..." oninput="filterJobs()">
            <button class="refresh-btn" onclick="loadJobs()">🔄 Osveži</button>
        </div>
        
        <div class="jobs-list" id="jobs-list">
            <div class="empty-state">
                <div class="icon">⏳</div>
                <div>Nalagam...</div>
            </div>
        </div>
    </div>
    
    <script>
        const FLAGS = {
            HR: '🇭🇷', CZ: '🇨🇿', PL: '🇵🇱', GR: '🇬🇷', 
            IT: '🇮🇹', HU: '🇭🇺', SK: '🇸🇰'
        };
        const LANGS = ['HR', 'CZ', 'PL', 'GR', 'IT', 'HU', 'SK', 'DE'];
        
        let allJobs = [];
        let downloadedItems = JSON.parse(localStorage.getItem('downloadedItems') || '{}');
        
        async function loadJobs() {
            try {
                // Get jobs from localizer API
                const response = await fetch('/launches/api/localizer/jobs');
                const data = await response.json();
                allJobs = data.jobs || [];
                
                // Sort by date descending
                allJobs.sort((a, b) => new Date(b.created) - new Date(a.created));
                
                renderJobs(allJobs);
            } catch (e) {
                console.error('Failed to load jobs:', e);
                document.getElementById('jobs-list').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <div>Napaka pri nalaganju</div>
                    </div>
                `;
            }
        }
        
        function filterJobs() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = query 
                ? allJobs.filter(j => j.name?.toLowerCase().includes(query) || j.id?.toLowerCase().includes(query))
                : allJobs;
            renderJobs(filtered);
        }
        
        function renderJobs(jobs) {
            const container = document.getElementById('jobs-list');
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>Ni najdenih videov</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = jobs.map(job => {
                const progress = job.completed || 0;
                const total = 7;
                const percent = Math.round((progress / total) * 100);
                const statusClass = job.status || 'pending';
                
                return `
                    <div class="job-card ${statusClass}">
                        <div class="job-header">
                            <div class="job-name">${job.name || job.id}</div>
                            <div class="job-status ${statusClass}">
                                ${statusClass === 'done' ? '✅ Končano' : 
                                  statusClass === 'processing' ? '⏳ ' + (job.currentLang || 'Procesiranje') :
                                  statusClass === 'translating' ? '🔄 Prevajanje' :
                                  statusClass === 'error' ? '❌ Napaka' : '⏸️ V vrsti'}
                            </div>
                        </div>
                        
                        ${statusClass !== 'done' && statusClass !== 'error' ? `
                            <div class="progress-container">
                                <div class="progress-header">
                                    <span>${job.currentLang ? 'Generiranje ' + job.currentLang : 'Čakanje...'}</span>
                                    <span>${progress}/${total} (${percent}%)</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${statusClass}" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="job-meta">
                            <span>📅 ${new Date(job.created).toLocaleString('sl-SI')}</span>
                            ${job.style ? `<span>🎨 ${job.style}</span>` : ''}
                            ${job.fontSize ? `<span>🔤 ${job.fontSize}px</span>` : ''}
                        </div>
                        
                        ${statusClass === 'done' ? `
                            <div class="download-grid">
                                ${LANGS.map(lang => {
                                    const key = job.id + '-' + lang;
                                    const isDownloaded = downloadedItems[key];
                                    return `
                                        <a href="/launches/api/localizer/job/${job.id}/video/${lang}" 
                                           class="download-item ${isDownloaded ? 'downloaded' : ''}"
                                           onclick="markDownloaded('${key}', this)"
                                           download>
                                            <span class="flag">${FLAGS[lang]}</span>
                                            <div class="info">
                                                <div class="code">${lang}</div>
                                            </div>
                                        </a>
                                    `;
                                }).join('')}
                            </div>
                        ` : ''}
                        
                        ${statusClass === 'error' ? `
                            <div style="color: #ef4444; font-size: 13px;">
                                ${job.error || 'Neznana napaka'}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function markDownloaded(key, element) {
            downloadedItems[key] = true;
            localStorage.setItem('downloadedItems', JSON.stringify(downloadedItems));
            element.classList.add('downloaded');
        }
        
        // Load jobs on page load
        loadJobs();
        
        // Auto-refresh every 5 seconds if any job is processing
        setInterval(() => {
            if (allJobs.some(j => j.status === 'processing' || j.status === 'translating')) {
                loadJobs();
            }
        }, 5000);
    </script>
</body>
</html>
