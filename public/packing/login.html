<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing - Prijava</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #16213e; border-radius: 12px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: #e94560; text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: #888; text-align: center; margin-bottom: 24px; font-size: 14px; }
        label { color: #ccc; font-size: 13px; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #fff; font-size: 15px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #e94560; }
        button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 600; }
        button:hover { background: #c73652; }
        .error { color: #e94560; text-align: center; margin-top: 12px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📦 Packing</h1>
        <p class="subtitle">Noriks pakirni sistem</p>
        <form id="loginForm">
            <label>Uporabnik</label>
            <input type="text" id="username" autocomplete="username" autofocus>
            <label>Geslo</label>
            <input type="password" id="password" autocomplete="current-password">
            <button type="submit">Prijava</button>
        </form>
        <p class="error" id="error">Napačno uporabniško ime ali geslo</p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
